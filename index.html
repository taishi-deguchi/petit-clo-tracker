<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Petit Clo">
<title>Petit Clo 来客記録</title>
<style>
  :root {
    --bg: #faf9f7;
    --surface: #ffffff;
    --surface2: #f4f2ef;
    --border: #e8e4df;
    --border2: #d4cfc8;
    --text: #1a1714;
    --text2: #6b6560;
    --text3: #9e9891;
    --accent: #c4956a;
    --accent-bg: #fdf4eb;
    --accent-border: #e8c99a;
    --success: #5a8a6a;
    --success-bg: #eef5f0;
    --success-border: #a8d0b4;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'YuGothic', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 560px; margin: 0 auto; padding-bottom: 2rem; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; }
  .header-brand { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; }
  .header-meta { font-size: 12px; color: var(--text3); }
  .screen { display: none; padding: 20px; }
  .screen.active { display: block; }
  .section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
  label.field-label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; }
  input[type="text"], input[type="date"], input[type="number"] { width: 100%; padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; color: var(--text); outline: none; font-family: inherit; -webkit-appearance: none; }
  input:focus { border-color: var(--accent-border); background: var(--accent-bg); }
  .btn { display: block; width: 100%; padding: 13px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--surface); color: var(--text); font-size: 14px; font-family: inherit; font-weight: 500; cursor: pointer; text-align: center; transition: background 0.15s, transform 0.1s; -webkit-appearance: none; }
  .btn:active { transform: scale(0.98); background: var(--surface2); }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:active { background: #b8845a; }
  .btn-success { background: var(--success-bg); color: var(--success); border-color: var(--success-border); font-size: 16px; font-weight: 600; padding: 18px; }
  .btn-exit { background: var(--surface2); color: var(--text2); font-size: 16px; padding: 18px; }
  .btn-small { display: inline-block; width: auto; padding: 7px 14px; font-size: 13px; }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--text2); font-size: 13px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid-2-auto { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .stat-card { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px; text-align: center; }
  .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; letter-spacing: 0.05em; }
  .stat-value { font-size: 26px; font-weight: 600; color: var(--text); line-height: 1; }
  .stat-value.highlight { color: var(--accent); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .exit-buttons { display: flex; flex-direction: column; gap: 6px; }
  .exit-btn { text-align: left; padding: 12px 14px; font-size: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); cursor: pointer; font-family: inherit; transition: background 0.12s; -webkit-appearance: none; width: 100%; }
  .exit-btn:active { background: var(--accent-bg); border-color: var(--accent-border); }
  .tags-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
  .tag-btn { padding: 7px 12px; border-radius: 20px; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); font-size: 13px; font-family: inherit; cursor: pointer; transition: all 0.12s; -webkit-appearance: none; }
  .tag-btn.active { background: var(--accent-bg); border-color: var(--accent-border); color: var(--accent); font-weight: 500; }
  .memo-input { width: 100%; padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; color: var(--text); outline: none; font-family: inherit; -webkit-appearance: none; }
  .memo-input:focus { border-color: var(--accent-border); background: var(--accent-bg); }
  .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .summary-row:last-child { border-bottom: none; }
  .summary-row-label { color: var(--text); }
  .summary-row-value { color: var(--text2); font-size: 13px; }
  .log-item { padding: 8px 12px; background: var(--surface2); border-radius: var(--radius-sm); margin-bottom: 6px; font-size: 13px; color: var(--text2); display: flex; gap: 8px; align-items: flex-start; }
  .log-time { color: var(--text3); flex-shrink: 0; font-size: 12px; margin-top: 1px; }
  .log-result-buy { color: var(--success); font-weight: 600; }
  .copy-btn { background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); padding: 14px; font-size: 15px; font-family: inherit; font-weight: 600; width: 100%; cursor: pointer; -webkit-appearance: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .copy-btn.copied { background: var(--success); }
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.25s; z-index: 999; white-space: nowrap; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .back-btn { display: flex; align-items: center; gap: 6px; color: var(--text2); font-size: 13px; background: none; border: none; cursor: pointer; font-family: inherit; padding: 0; margin-bottom: 16px; }
  .undo-area { display: flex; justify-content: flex-end; margin-bottom: 4px; }
</style>
</head>
<body>
<div class="header">
  <span class="header-brand">Petit Clo</span>
  <span class="header-meta" id="header-meta">来客記録</span>
</div>
<div class="toast" id="toast"></div>
<div class="screen active" id="screen-setup">
  <div style="margin-bottom:20px;margin-top:8px;">
    <div style="font-size:20px;font-weight:600;margin-bottom:4px;">イベント情報</div>
    <div style="font-size:13px;color:var(--text3);">記録を始める前に入力してください</div>
  </div>
  <div class="card">
    <label class="field-label">イベント名</label>
    <input type="text" id="setup-name" placeholder="例：〇〇マルシェ">
    <div style="height:12px;"></div>
    <label class="field-label">開催日</label>
    <input type="date" id="setup-date">
  </div>
  <button class="btn btn-primary" onclick="startTracking()">記録を開始する →</button>
</div>
<div class="screen" id="screen-main">
  <div class="grid-2-auto">
    <div class="stat-card"><div class="stat-label">来客</div><div class="stat-value" id="stat-total">0<span style="font-size:14px;font-weight:400;color:var(--text3);">組</span></div></div>
    <div class="stat-card"><div class="stat-label">購入</div><div class="stat-value" id="stat-buy">0<span style="font-size:14px;font-weight:400;color:var(--text3);">組</span></div></div>
  </div>
  <div class="card" style="padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <div><div style="font-size:11px;color:var(--text3);">購入率</div><div style="font-size:22px;font-weight:600;color:var(--accent);" id="stat-rate">— %</div></div>
    <button class="btn btn-small btn-ghost" onclick="undoLast()">← 最後を取消</button>
  </div>
  <div class="section-title">① この組の結果</div>
  <div class="grid-2" style="margin-bottom:8px;">
    <button class="btn btn-success" onclick="logVisitor('buy')">購入 ✓</button>
    <button class="btn btn-exit" onclick="toggleExitPanel()">離脱 →</button>
  </div>
  <div id="exit-panel" style="display:none;margin-bottom:12px;">
    <div class="card" style="padding:12px;">
      <div class="section-title" style="margin-bottom:8px;">離脱理由</div>
      <div class="exit-buttons">
        <button class="exit-btn" onclick="logVisitor('exit-price-low')">値段を見て去った（2,000円台）</button>
        <button class="exit-btn" onclick="logVisitor('exit-price-mid')">値段を見て去った（3,000円台）</button>
        <button class="exit-btn" onclick="logVisitor('exit-price-high')">値段を見て去った（4,000円台）</button>
        <button class="exit-btn" onclick="logVisitor('exit-held')">手に取ったが戻した</button>
        <button class="exit-btn" onclick="logVisitor('exit-tried')">子供に当ててみたが去った</button>
        <button class="exit-btn" onclick="logVisitor('exit-long')">長時間滞在して未購入</button>
        <button class="exit-btn" onclick="logVisitor('exit-competitor')">競合と比較して離脱</button>
        <button class="exit-btn" onclick="logVisitor('exit-other')">その他</button>
      </div>
    </div>
  </div>
  <hr class="divider">
  <div class="section-title">② 特徴タグ（任意・複数可）</div>
  <div class="tags-wrap" id="tag-area" style="margin-bottom:14px;"></div>
  <hr class="divider">
  <div class="section-title">③ メモ（任意）</div>
  <input class="memo-input" type="text" id="visitor-memo" placeholder="例：SNSで見たと言っていた" style="margin-bottom:16px;">
  <hr class="divider">
  <div class="grid-2">
    <button class="btn" onclick="showSummary()">集計を見る</button>
    <button class="btn" onclick="showLog()">記録一覧</button>
  </div>
</div>
<div class="screen" id="screen-summary">
  <button class="back-btn" onclick="backToMain()">← 記録に戻る</button>
  <div style="font-size:18px;font-weight:600;margin-bottom:16px;">集計</div>
  <div class="grid-2-auto">
    <div class="stat-card"><div class="stat-label">総来客</div><div class="stat-value" id="sum-total">0<span style="font-size:13px;color:var(--text3);">組</span></div></div>
    <div class="stat-card"><div class="stat-label">購入率</div><div class="stat-value highlight" id="sum-rate">—</div></div>
  </div>
  <div class="card"><div class="section-title">離脱パターン</div><div id="sum-exit-list"></div></div>
  <div class="card"><div class="section-title">来客特徴タグ</div><div id="sum-tag-list"></div></div>
  <div class="card"><div class="section-title">メモ一覧</div><div id="sum-memo-list"></div></div>
  <hr class="divider">
  <button class="copy-btn" id="copy-btn" onclick="copyMD()">
    <span id="copy-icon">📋</span><span id="copy-label">mdをコピーする</span>
  </button>
  <div style="font-size:12px;color:var(--text3);text-align:center;margin-top:8px;">コピー後、Claudeに貼り付けて分析依頼できます</div>
</div>
<div class="screen" id="screen-log">
  <button class="back-btn" onclick="backToMain()">← 記録に戻る</button>
  <div style="font-size:18px;font-weight:600;margin-bottom:16px;">記録一覧</div>
  <div id="log-list"></div>
</div>
<script>
const TAGS=[{id:'age0',label:'0〜3歳連れ'},{id:'age4',label:'4〜6歳連れ'},{id:'age-ele',label:'小学生連れ'},{id:'no-child',label:'子供なし'},{id:'sns',label:'SNS経由の気配'},{id:'repeat',label:'リピーター感'},{id:'world',label:'世界観に反応'},{id:'photo',label:'写真を撮った'},{id:'price-focus',label:'価格重視の印象'},{id:'passing',label:'通りすがり感'}];
const EXIT_LABELS={'exit-price-low':'値段で離脱（2,000円台）','exit-price-mid':'値段で離脱（3,000円台）','exit-price-high':'値段で離脱（4,000円台）','exit-held':'手に取ったが戻した','exit-tried':'子供に当ててみたが去った','exit-long':'長時間滞在して未購入','exit-competitor':'競合比較して離脱','exit-other':'その他離脱'};
let eventName='',eventDate='',records=[],activeTags=new Set();
function startTracking(){eventName=document.getElementById('setup-name').value.trim()||'（未設定）';eventDate=document.getElementById('setup-date').value||'（未設定）';document.getElementById('header-meta').textContent=eventName;showScreen('screen-main');renderTags();updateStats();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function renderTags(){const area=document.getElementById('tag-area');area.innerHTML='';TAGS.forEach(tag=>{const btn=document.createElement('button');btn.className='tag-btn'+(activeTags.has(tag.id)?' active':'');btn.textContent=tag.label;btn.onclick=()=>{activeTags.has(tag.id)?activeTags.delete(tag.id):activeTags.add(tag.id);renderTags();};area.appendChild(btn);});}
function toggleExitPanel(){const p=document.getElementById('exit-panel');p.style.display=p.style.display==='none'?'block':'none';}
function logVisitor(result){const memo=document.getElementById('visitor-memo').value.trim();const time=new Date().toTimeString().slice(0,5);records.push({time,result,tags:[...activeTags],memo});activeTags.clear();document.getElementById('visitor-memo').value='';document.getElementById('exit-panel').style.display='none';renderTags();updateStats();showToast(result==='buy'?'購入 ✓ 記録しました':'離脱を記録しました');}
function undoLast(){if(!records.length)return;records.pop();updateStats();showToast('最後の記録を取り消しました');}
function updateStats(){const total=records.length,buys=records.filter(r=>r.result==='buy').length;document.getElementById('stat-total').innerHTML=total+'<span style="font-size:14px;font-weight:400;color:var(--text3);">組</span>';document.getElementById('stat-buy').innerHTML=buys+'<span style="font-size:14px;font-weight:400;color:var(--text3);">組</span>';document.getElementById('stat-rate').textContent=total>0?Math.round(buys/total*100)+' %':'— %';}
function showSummary(){showScreen('screen-summary');const total=records.length,buys=records.filter(r=>r.result==='buy').length;document.getElementById('sum-total').innerHTML=total+'<span style="font-size:13px;color:var(--text3);">組</span>';document.getElementById('sum-rate').textContent=total>0?Math.round(buys/total*100)+' %':'—';const exits=records.filter(r=>r.result!=='buy'),exitCount={};exits.forEach(r=>{exitCount[r.result]=(exitCount[r.result]||0)+1;});const exitList=document.getElementById('sum-exit-list'),exitEntries=Object.entries(exitCount).sort((a,b)=>b[1]-a[1]);exitList.innerHTML=exitEntries.length===0?'<div style="font-size:13px;color:var(--text3);">（なし）</div>':exitEntries.map(([k,v])=>`<div class="summary-row"><span class="summary-row-label">${EXIT_LABELS[k]||k}</span><span class="summary-row-value">${v}件 (${Math.round(v/exits.length*100)}%)</span></div>`).join('');const tagCount={},tagMap={};TAGS.forEach(t=>tagMap[t.id]=t.label);records.forEach(r=>r.tags.forEach(t=>{tagCount[t]=(tagCount[t]||0)+1;}));const tagList=document.getElementById('sum-tag-list'),tagEntries=Object.entries(tagCount).sort((a,b)=>b[1]-a[1]);tagList.innerHTML=tagEntries.length===0?'<div style="font-size:13px;color:var(--text3);">（なし）</div>':tagEntries.map(([k,v])=>`<div class="summary-row"><span class="summary-row-label">${tagMap[k]||k}</span><span class="summary-row-value">${v}件</span></div>`).join('');const memoRecords=records.filter(r=>r.memo),memoList=document.getElementById('sum-memo-list');memoList.innerHTML=memoRecords.length===0?'<div style="font-size:13px;color:var(--text3);">（なし）</div>':memoRecords.map(r=>`<div class="log-item"><span class="log-time">${r.time}</span><span>${r.memo}</span></div>`).join('');}
function showLog(){showScreen('screen-log');const list=document.getElementById('log-list'),tagMap={};TAGS.forEach(t=>tagMap[t.id]=t.label);if(!records.length){list.innerHTML='<div style="font-size:13px;color:var(--text3);text-align:center;padding:2rem 0;">まだ記録がありません</div>';return;}list.innerHTML=[...records].reverse().map(r=>{const isBuy=r.result==='buy',tagStr=r.tags.map(t=>tagMap[t]||t).join('・');return`<div class="log-item" style="flex-direction:column;gap:4px;"><div style="display:flex;gap:8px;align-items:center;"><span class="log-time">${r.time}</span><span class="${isBuy?'log-result-buy':''}">${isBuy?'購入':(EXIT_LABELS[r.result]||r.result)}</span></div>${tagStr?`<div style="font-size:12px;color:var(--text3);">${tagStr}</div>`:''} ${r.memo?`<div style="font-size:13px;color:var(--text2);">${r.memo}</div>`:''}</div>`;}).join('');}
function backToMain(){showScreen('screen-main');}
function generateMD(){const total=records.length,buys=records.filter(r=>r.result==='buy').length,exits=records.filter(r=>r.result!=='buy'),exitCount={};exits.forEach(r=>{exitCount[r.result]=(exitCount[r.result]||0)+1;});const tagCount={},tagMap={};TAGS.forEach(t=>tagMap[t.id]=t.label);records.forEach(r=>r.tags.forEach(t=>{tagCount[t]=(tagCount[t]||0)+1;}));const exitLines=Object.entries(exitCount).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`- ${EXIT_LABELS[k]||k}：${v}件`).join('\n')||'- （なし）';const tagLines=Object.entries(tagCount).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`- ${tagMap[k]||k}：${v}件`).join('\n')||'- （なし）';const memoLines=records.filter(r=>r.memo).map(r=>`- ${r.time} [${r.result==='buy'?'購入':EXIT_LABELS[r.result]||r.result}] ${r.memo}`).join('\n')||'- （なし）';return`## ${eventDate}\n\n### イベント名\n${eventName}\n\n---\n\n# 来客数\n\n### 総来客数（組）\n${total}\n\n### 購入者数（組）\n${buys}\n\n### 購入率\n${total>0?Math.round(buys/total*100)+'%':'—'}\n\n---\n\n# 離脱パターン（リアルタイム記録）\n\n${exitLines}\n\n---\n\n# 来客特徴タグ（延べ件数）\n\n${tagLines}\n\n---\n\n# メモ一覧（時刻付き）\n\n${memoLines}\n\n---\n\n# Claude分析\n\n<!-- Claudeに貼り付けて分析依頼してください -->\n\n---\n\n# 次回改善候補\n\n<!-- Claudeに貼り付けて分析依頼してください -->\n`;}
function copyMD(){const md=generateMD(),btn=document.getElementById('copy-btn'),label=document.getElementById('copy-label');if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(md).then(()=>{label.textContent='コピーしました！';btn.classList.add('copied');setTimeout(()=>{label.textContent='mdをコピーする';btn.classList.remove('copied');},2500);});}else{const ta=document.createElement('textarea');ta.value=md;ta.style.cssText='position:fixed;top:-9999px;';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);label.textContent='コピーしました！';btn.classList.add('copied');setTimeout(()=>{label.textContent='mdをコピーする';btn.classList.remove('copied');},2500);}}
function showToast(msg){const toast=document.getElementById('toast');toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1800);}
</script>
</body>
</html>
